<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuakeVision Live Client</title>

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>

<body>
    <h2>🛰 QuakeVision Live Alerts</h2>
    <ul id="alerts"></ul>

    <script>
        const firebaseConfig = {
                apiKey: "AIzaSyB6KdzZT0gl7XJMB-TO79ttgU5EgKF8Sqc",
                authDomain: "quakevision-f80bc.firebaseapp.com",
                projectId: "quakevision-f80bc",
                storageBucket: "quakevision-f80bc.appspot.com",
                messagingSenderId: "1066517075530",
                appId: "1:1066517075530:web:7de5ef97e48d4a5fccf8b3",
            };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const messaging = firebase.messaging();

        // Register service worker for messaging
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('firebase-messaging-sw.js')
                .then(registration => console.log('Service Worker registered'))
                .catch(err => console.error('Service Worker registration failed:', err));
        }

        // Request notification permission
        messaging.requestPermission()
            .then(() => {
                console.log('Notification permission granted');
                return messaging.getToken();
            })
            .then(token => {
                console.log('FCM Token:', token);
            })
            .catch(err => console.warn('Notification permission denied or error:', err));

        // Handle foreground messages
        messaging.onMessage(payload => {
            console.log('Message received in foreground:', payload);
        });

        console.log("Client connected. Listening for alerts...");

        db.collection("alerts")
            .orderBy("timestamp", "desc")
            .limit(1)
            .onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const alert = change.doc.data();
                        console.log("🚨 ALERT RECEIVED:", alert);

                        const li = document.createElement("li");
                        li.textContent =
                            `⚠️ ${alert.severity} | M${alert.magnitude} | ${alert.location}`;
                        document.getElementById("alerts").appendChild(li);
                    }
                });
            });
    </script>
</body>

</html>
